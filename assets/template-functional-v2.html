<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Capability Poster</title>
    <style>
      :root {
        --paper: #f5efe4;
        --paper-2: #eee6d8;
        --card: rgba(255, 252, 247, 0.92);
        --card-strong: #fffdf9;
        --line: #ddd3c4;
        --ink: #231f19;
        --muted: #61584c;
        --blue: #2f6fe2;
        --blue-soft: #eaf1ff;
        --green: #169365;
        --green-soft: #e8f8f1;
        --orange: #e07a35;
        --orange-soft: #fff1e8;
        --purple: #7e45d9;
        --purple-soft: #f4ecff;
        --yellow: #f6df7f;
        --yellow-2: #fdeead;
        --footer: #232a38;
        --footer-text: #d3d9e4;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family:
          "SF Pro Display",
          "PingFang SC",
          "Hiragino Sans GB",
          "Microsoft YaHei",
          sans-serif;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.58), transparent 32%),
          linear-gradient(180deg, var(--paper) 0%, var(--paper-2) 100%);
        color: var(--ink);
      }

      code,
      .mono {
        font-family:
          ui-monospace,
          "SFMono-Regular",
          Menlo,
          Monaco,
          Consolas,
          "Liberation Mono",
          monospace;
      }

      #poster {
        width: 100%;
        max-width: 1600px;
        margin: 0 auto;
        padding: 28px 28px 24px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 22px;
        margin-bottom: 16px;
      }

      .source {
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 0.16em;
        color: #786f61;
        text-transform: uppercase;
      }

      .title {
        margin: 8px 0 10px;
        font-size: 54px;
        line-height: 1.04;
        font-weight: 900;
        letter-spacing: -0.04em;
      }

      .subtitle {
        max-width: 980px;
        font-size: 18px;
        line-height: 1.6;
        color: var(--muted);
      }

      .meta {
        min-width: 360px;
        text-align: right;
      }

      .badges {
        display: flex;
        justify-content: flex-end;
        flex-wrap: wrap;
        gap: 8px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 6px 12px;
        border-radius: 999px;
        border: 1px solid #cec5b6;
        background: rgba(255, 255, 255, 0.78);
        font-size: 13px;
        font-weight: 800;
        color: #473f34;
      }

      .snapshot {
        margin-top: 10px;
        font-size: 13px;
        color: #786e61;
      }

      .ribbon {
        border-radius: 14px;
        border: 1px solid #e8d16a;
        background: linear-gradient(180deg, var(--yellow-2), var(--yellow));
        padding: 12px 16px;
        margin-bottom: 16px;
        box-shadow: 0 10px 28px rgba(141, 106, 17, 0.08);
      }

      .ribbon-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }

      .ribbon-item {
        min-width: 0;
        padding-left: 12px;
        border-left: 1px solid rgba(110, 94, 45, 0.28);
      }

      .ribbon-item:first-child {
        padding-left: 0;
        border-left: 0;
      }

      .ribbon-title {
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #4f4432;
        margin-bottom: 4px;
      }

      .ribbon-text {
        font-size: 13px;
        line-height: 1.45;
        color: #4a4031;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 16px;
      }

      .column {
        min-width: 0;
      }

      .column-head {
        color: #fff;
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 23px;
        font-weight: 900;
        letter-spacing: 0.02em;
        box-shadow: 0 10px 26px rgba(24, 24, 24, 0.1);
      }

      .column-body {
        margin-top: 10px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .block {
        background: linear-gradient(180deg, var(--card-strong), var(--card));
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: hidden;
      }

      .block-head {
        padding: 10px 12px;
        font-size: 14px;
        font-weight: 900;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .block-body {
        padding: 10px 12px 12px;
      }

      .summary {
        font-size: 14px;
        line-height: 1.55;
        color: #433d35;
      }

      .commands {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .command {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 5px 8px;
        border-radius: 8px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        background: rgba(255, 255, 255, 0.82);
        font-size: 12px;
        line-height: 1.35;
        color: #302b25;
      }

      .footer {
        margin-top: 16px;
        border-radius: 12px;
        background: linear-gradient(180deg, #2c3444, var(--footer));
        padding: 14px 16px;
      }

      .footer-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }

      .footer-label {
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #f1d372;
        margin-bottom: 8px;
      }

      .footer-items {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .footer-item {
        display: inline-flex;
        align-items: center;
        padding: 5px 8px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.06);
        font-size: 12px;
        line-height: 1.35;
        color: var(--footer-text);
      }

      .footer-note {
        margin-top: 10px;
        display: flex;
        justify-content: space-between;
        gap: 20px;
        font-size: 12px;
        line-height: 1.5;
        color: #96a3b7;
      }

      .blue-head {
        background: linear-gradient(180deg, #3c7cf1, var(--blue));
      }
      .green-head {
        background: linear-gradient(180deg, #1ab277, var(--green));
      }
      .orange-head {
        background: linear-gradient(180deg, #f08d4f, var(--orange));
      }
      .purple-head {
        background: linear-gradient(180deg, #9658f6, var(--purple));
      }

      .blue-card .block-head {
        background: var(--blue-soft);
        color: var(--blue);
      }
      .green-card .block-head {
        background: var(--green-soft);
        color: var(--green);
      }
      .orange-card .block-head {
        background: var(--orange-soft);
        color: var(--orange);
      }
      .purple-card .block-head {
        background: var(--purple-soft);
        color: var(--purple);
      }
    </style>
  </head>
  <body>
    <div id="poster"></div>
    <script>
      const DATA = __POSTER_DATA__;

      const styleMap = {
        blue: { head: "blue-head", card: "blue-card" },
        green: { head: "green-head", card: "green-card" },
        orange: { head: "orange-head", card: "orange-card" },
        purple: { head: "purple-head", card: "purple-card" }
      };

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function renderRibbon(items) {
        return items
          .map(
            (item) => `
              <div class="ribbon-item">
                <div class="ribbon-title">${escapeHtml(item.title)}</div>
                <div class="ribbon-text mono">${escapeHtml(item.text)}</div>
              </div>`,
          )
          .join("");
      }

      function renderBlocks(column) {
        const style = styleMap[column.color];
        return `
          <section class="column ${style.card}">
            <div class="column-head ${style.head}">${escapeHtml(column.title)}</div>
            <div class="column-body">
              ${column.blocks
                .map(
                  (block) => `
                    <div class="block">
                      <div class="block-head">${escapeHtml(block.heading)}</div>
                      <div class="block-body">
                        <div class="summary">${escapeHtml(block.summary)}</div>
                        <div class="commands">
                          ${block.commands
                            .map((command) => `<span class="command mono">${escapeHtml(command)}</span>`)
                            .join("")}
                        </div>
                      </div>
                    </div>`,
                )
                .join("")}
            </div>
          </section>`;
      }

      function renderFooter(groups) {
        return groups
          .map(
            (group) => `
              <div>
                <div class="footer-label">${escapeHtml(group.label)}</div>
                <div class="footer-items">
                  ${group.items
                    .map((item) => `<span class="footer-item mono">${escapeHtml(item)}</span>`)
                    .join("")}
                </div>
              </div>`,
          )
          .join("");
      }

      document.getElementById("poster").innerHTML = `
        <header class="topbar">
          <div>
            <div class="source">${escapeHtml(DATA.source)}</div>
            <h1 class="title">${escapeHtml(DATA.title)}</h1>
            <div class="subtitle">${escapeHtml(DATA.subtitle)}</div>
          </div>
          <div class="meta">
            <div class="badges">
              ${DATA.badges.map((badge) => `<span class="badge mono">${escapeHtml(badge)}</span>`).join("")}
            </div>
            <div class="snapshot">${escapeHtml(DATA.snapshot)}</div>
          </div>
        </header>
        <section class="ribbon">
          <div class="ribbon-grid">${renderRibbon(DATA.ribbon)}</div>
        </section>
        <main class="grid">
          ${DATA.columns.map(renderBlocks).join("")}
        </main>
        <footer class="footer">
          <div class="footer-grid">${renderFooter(DATA.footerGroups)}</div>
          <div class="footer-note">
            <span>Generated with capability-poster.</span>
            <span>Functional cheatsheet layout v1.</span>
          </div>
        </footer>`;
    </script>
  </body>
</html>
